<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Terraform - Angel Gonzalez</title>
    <style>
        :root {
            --tf-purple: #8449FB;
            --tf-dark-purple: #5C4EE5;
            --bg-black: #0d0e12;
            --card-bg: rgba(23, 25, 35, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Canvas para el fondo tecnológico */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(132, 73, 251, 0.3);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(132, 73, 251, 0.1);
            max-width: 450px;
            width: 85%;
        }

        /* Logo de Terraform desde URL externa */
        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 0 10px var(--tf-purple));
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--tf-purple);
            margin-bottom: 8px;
            display: block;
        }

        .student-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            display: block;
        }

        .date-display {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.9rem;
            color: #10b981;
        }

        .footer-tag {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #52525b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="container">
        <div class="logo-container">
            <img src="https://cdn.simpleicons.org/terraform/8449FB" alt="Terraform Logo">
        </div>

        <h1>Bienvenido al examen Terraform</h1>

        <div class="info-box">
            <span class="label">Estudiante</span>
            <span class="student-name">Angel Leonardo Gonzalez Padilla</span>

            <span class="label">Marca de Tiempo</span>
            <div id="date" class="date-display">-- / -- / ----</div>
        </div>

        <div class="footer-tag">
            <span>Infrastructure as Code</span>
            <span>•</span>
            <span>v1.0.0</span>
        </div>
    </div>

    <script>
        // Reloj en tiempo real
        function startClock() {
            const dateElement = document.getElementById('date');
            const update = () => {
                const now = new Date();
                dateElement.textContent = now.toLocaleString('es-ES', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                }).replace(',', ' |');
            };
            setInterval(update, 1000);
            update();
        }

        // Fondo de red neuronal minimalista
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let pts = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            pts = [];
            for (let i = 0; i < 60; i++) {
                pts.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(132, 73, 251, 0.15)';
            ctx.fillStyle = 'rgba(132, 73, 251, 0.3)';
            
            pts.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < pts.length; j++) {
                    const p2 = pts[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.lineWidth = 1 - dist / 150;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
        startClock();
    </script>
</body>
</html>
